<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <!-- أضفنا هنا uiLoading: no لإخفاء شاشة التحميل التي قد تعطل الكاميرا -->
    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no;" color-management="true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        
        <a-assets timeout="600000">
            <!-- تأكد أن اسم الملف هنا مطابق تماماً للمرفوع على جيت هاب -->
            <a-asset-item id="productModel" src="model.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
           <a-gltf-model 
    src="#productModel" 
    position="0 0 0" 
    scale="2 2 2"
    rotaion="-90 0 0"
    animation="property: position; to: 0 0.2 0; dir: alternate; dur: 2000; easing: easeInOutSine; loop: true">
</a-gltf-model>
        </a-entity>
    </a-scene>

    <!-- أداة الفحص -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</body>
</html>
