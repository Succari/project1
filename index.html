<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
</head>
<body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" color-management="true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <!-- تأكد أن الأسماء هنا تطابق ملفاتك المرفوعة تماماً -->
            <a-asset-item id="productModel" src="./product.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#productModel" rotation="0 0 0" position="0 0 0" scale="0.1 0.1 0.1">
            </a-gltf-model>
        </a-entity>
    </a-scene>

    <!-- أداة فحص الأخطاء - احذفها بعد أن يعمل الموقع -->
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script>
</body>
</html>
